# AuthorizedOP 配置文件
# 为防止作弊者可以通过BUG从从控制台执行命令
# 这里提供指令开关
# true 为开启指令
# false 为关闭指令
是否开启指令管理: true
# 插件检测非法OP的速度
# 单位：tick(20tick = 1秒)
插件检测速度: 20
# 授权玩家列表（玩家名 -> UUID绑定）
# 格式: 玩家名: "UUID"
# UUID为空字符串""表示尚未绑定，将在玩家首次登录时自动绑定
# 示例:
#   steve: "12345678-abcd-1234-efgh-123456789012"
#   alex: ""
# 手动填写请注意格式，建议通过 /aop add 命令添加
获得OP授权的玩家: {}